<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>P5_5_女性诺贝尔奖</title>
    <link rel="stylesheet" href="./style.css?v=20260709-1200" />
  </head>
  <body>
    <main id="stage" aria-label="1901 到 2025 年诺贝尔奖女性获奖者星雨可视化"></main>
    <section id="control-panel" aria-label="动画参数设置">
      <div class="panel-header">
        <strong>参数</strong>
        <div class="panel-actions">
          <button id="play-button" type="button">播放</button>
          <button id="panel-toggle" type="button" aria-expanded="true" aria-controls="panel-body">收起</button>
        </div>
      </div>
      <div id="panel-body" class="panel-body">
        <label>
          <span>最小星星 <output data-config-value="starMinScale">0.55</output></span>
          <input data-config-key="starMinScale" type="range" min="0.35" max="1.4" step="0.05" value="0.55" />
        </label>
        <label>
          <span>最大星星 <output data-config-value="starMaxScale">1.30</output></span>
          <input data-config-key="starMaxScale" type="range" min="0.7" max="2.2" step="0.05" value="1.3" />
        </label>
        <label>
          <span>布局错乱 <output data-config-value="layoutChaos">0.40</output></span>
          <input data-config-key="layoutChaos" type="range" min="0" max="1" step="0.05" value="0.4" />
        </label>
        <label>
          <span>落后微动 <output data-config-value="settledMotion">0.45</output></span>
          <input data-config-key="settledMotion" type="range" min="0" max="1.5" step="0.05" value="0.45" />
        </label>
        <label>
          <span>尾巴粗细 <output data-config-value="tailThickness">2.50</output></span>
          <input data-config-key="tailThickness" type="range" min="0.2" max="2.5" step="0.05" value="2.5" />
        </label>
        <label>
          <span>尾巴长度 <output data-config-value="tailLength">2.50</output></span>
          <input data-config-key="tailLength" type="range" min="0.2" max="3" step="0.05" value="2.5" />
        </label>
        <label>
          <span>白星落后明显 <output data-config-value="whiteStarOpacity">10</output></span>
          <input data-config-key="whiteStarOpacity" type="range" min="0.05" max="10" step="0.05" value="10" />
        </label>
        <label>
          <span>白星边缘光 <output data-config-value="whiteStarGlow">0</output></span>
          <input data-config-key="whiteStarGlow" type="range" min="0" max="4" step="0.05" value="0" />
        </label>
        <label>
          <span>黄星边缘光 <output data-config-value="yellowStarGlow">0.00</output></span>
          <input data-config-key="yellowStarGlow" type="range" min="0" max="4" step="0.05" value="0" />
        </label>
        <label>
          <span>文字大小 <output data-config-value="textSize">50</output></span>
          <input data-config-key="textSize" type="number" min="20" max="300" step="1" value="50" />
        </label>
        <label>
          <span>文字间距 <output data-config-value="textTracking">0</output></span>
          <input data-config-key="textTracking" type="range" min="-2" max="12" step="0.5" value="0" />
        </label>
        <label>
          <span>文字行距 <output data-config-value="textLineGap">64</output></span>
          <input data-config-key="textLineGap" type="range" min="42" max="100" step="1" value="64" />
        </label>
        <label>
          <span>底框透明 <output data-config-value="textBoxAlpha">0.05</output></span>
          <input data-config-key="textBoxAlpha" type="range" min="0.05" max="0.6" step="0.01" value="0.05" />
        </label>
        <label>
          <span>底框高度 <output data-config-value="textBoxHeight">1</output></span>
          <input data-config-key="textBoxHeight" type="range" min="0.65" max="1.6" step="0.05" value="1" />
        </label>
        <label>
          <span>画布宽度 <output data-config-value="canvasWidth">1080</output></span>
          <input data-config-key="canvasWidth" type="range" min="720" max="1600" step="20" value="1080" />
        </label>
        <label>
          <span>画布高度 <output data-config-value="canvasHeight">1440</output></span>
          <input data-config-key="canvasHeight" type="range" min="960" max="2000" step="20" value="1440" />
        </label>
        <label>
          <span>画布颜色 <output data-config-value="canvasColor">#2d60e5</output></span>
          <input data-config-key="canvasColor" type="color" value="#2d60e5" />
        </label>
      </div>
    </section>

    <script src="./p5.min.js"></script>
    <script src="./data/nobel_by_year.js"></script>
    <script src="./sketch.js?v=20260709-1200"></script>
  </body>
</html>
